<section class="solo-builds section" id="solo-builds" aria-labelledby="solo-builds-title">
  <div class="container">
    <div class="section__header fade-in">
      <h2 class="section__title" id="solo-builds-title">Solo <span>Builds</span></h2>
      <p class="section__subtitle">Apps I designed, developed, and deployed</p>
    </div>
    <div class="cards-grid" role="list">
      {% for project in site.data.solo_builds %}
      <article class="project-card fade-in" role="listitem">
        <h3 class="project-card__name">{{ project.name }}</h3>
        <p class="project-card__role">{{ project.role }}</p>
        <p class="project-card__description">{{ project.description }}</p>
        <div class="project-card__tech" aria-label="Technologies">
          {% for tech in project.tech %}
          <span class="tag">{{ tech }}</span>
          {% endfor %}
        </div>
        <a href="{{ project.url }}" class="project-card__link" target="_blank" rel="noopener noreferrer" aria-label="Visit {{ project.name }}">
          Visit Site <span aria-hidden="true">↗</span>
        </a>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
